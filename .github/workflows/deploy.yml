name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish build to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add .deploy gh-pages
          else
            git worktree add --detach .deploy
            cd .deploy
            git switch --orphan gh-pages
            cd ..
          fi
          find .deploy -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a build/. .deploy/
          touch .deploy/.nojekyll
          cd .deploy
          if [ -n "$(git status --short)" ]; then
            git add --all
            git commit -m "Deploy from ${GITHUB_SHA}"
            git push origin gh-pages
          else
            echo "No changes to publish."
          fi
          cd ..
          git worktree remove .deploy --force
