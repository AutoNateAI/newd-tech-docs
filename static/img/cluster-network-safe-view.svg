<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Safe cluster and network view</title>
  <desc id="desc">High-level private network access model.</desc>
  <rect width="1120" height="560" rx="24" fill="#161316"/>
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#fff8ed">Safe high-level access view</text>
  <text x="64" y="122" font-family="Arial, sans-serif" font-size="18" fill="#f0d8a5">Teach the workflow without publishing private infrastructure details.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="90" y="224" width="190" height="104" rx="14" fill="#fff8ed"/><text x="185" y="268" font-size="22" font-weight="700" fill="#521321">Approved Staff</text><text x="185" y="296" font-size="15" fill="#5d4d50">role-based access</text>
    <rect x="374" y="224" width="190" height="104" rx="14" fill="#d6a84f"/><text x="469" y="268" font-size="22" font-weight="700" fill="#2a2023">Private Network</text><text x="469" y="296" font-size="15" fill="#3d3033">approved devices</text>
    <rect x="658" y="224" width="190" height="104" rx="14" fill="#f0e1bf"/><text x="753" y="268" font-size="22" font-weight="700" fill="#521321">Compute</text><text x="753" y="296" font-size="15" fill="#5d4d50">runs tools</text>
    <rect x="922" y="224" width="118" height="104" rx="14" fill="#7a2633"/><text x="981" y="268" font-size="22" font-weight="700" fill="#fff8ed">Tools</text><text x="981" y="296" font-size="15" fill="#fff2db">modules</text>
  </g>
  <g stroke="#f0d8a5" stroke-width="5" stroke-linecap="round" fill="none"><path d="M282 276h88"/><path d="M566 276h88"/><path d="M850 276h68"/></g>
  <rect x="250" y="398" width="620" height="58" rx="12" fill="#2a2023" stroke="#7a2633"/>
  <text x="560" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#fff8ed">Docs show roles and workflows, not private keys, IPs, or credentials.</text>
</svg>
