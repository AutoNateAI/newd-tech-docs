<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">UI decision filter</title>
  <desc id="desc">A decision filter for deciding what belongs in the primary screen.</desc>
  <rect width="1120" height="520" rx="24" fill="#fffaf2"/>
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#521321">Should this be on the screen?</text>
  <text x="64" y="122" font-family="Arial, sans-serif" font-size="18" fill="#5d4d50">Use this before adding fields, cards, notes, or buttons.</text>
  <g font-family="Arial, sans-serif">
    <rect x="72" y="178" width="220" height="172" rx="12" fill="#ffffff" stroke="#ead8b4" stroke-width="2"/>
    <text x="182" y="230" text-anchor="middle" font-size="24" font-weight="700" fill="#7a2633">Needed?</text>
    <text x="182" y="270" text-anchor="middle" font-size="16" fill="#3d3033">Does it help finish</text>
    <text x="182" y="294" text-anchor="middle" font-size="16" fill="#3d3033">the current job?</text>
    <rect x="328" y="178" width="220" height="172" rx="12" fill="#ffffff" stroke="#ead8b4" stroke-width="2"/>
    <text x="438" y="230" text-anchor="middle" font-size="24" font-weight="700" fill="#7a2633">Safe?</text>
    <text x="438" y="270" text-anchor="middle" font-size="16" fill="#3d3033">Is this user allowed</text>
    <text x="438" y="294" text-anchor="middle" font-size="16" fill="#3d3033">to see it?</text>
    <rect x="584" y="178" width="220" height="172" rx="12" fill="#ffffff" stroke="#ead8b4" stroke-width="2"/>
    <text x="694" y="230" text-anchor="middle" font-size="24" font-weight="700" fill="#7a2633">Clear?</text>
    <text x="694" y="270" text-anchor="middle" font-size="16" fill="#3d3033">Can staff understand it</text>
    <text x="694" y="294" text-anchor="middle" font-size="16" fill="#3d3033">without tech context?</text>
    <rect x="840" y="178" width="220" height="172" rx="12" fill="#ffffff" stroke="#ead8b4" stroke-width="2"/>
    <text x="950" y="230" text-anchor="middle" font-size="24" font-weight="700" fill="#7a2633">Timed?</text>
    <text x="950" y="270" text-anchor="middle" font-size="16" fill="#3d3033">Is this the right</text>
    <text x="950" y="294" text-anchor="middle" font-size="16" fill="#3d3033">moment to show it?</text>
  </g>
  <g fill="none" stroke="#d6a84f" stroke-width="5" stroke-linecap="round">
    <path d="M292 264h32"/>
    <path d="M548 264h32"/>
    <path d="M804 264h32"/>
  </g>
  <g fill="#d6a84f">
    <path d="M322 252l24 12-24 12z"/>
    <path d="M578 252l24 12-24 12z"/>
    <path d="M834 252l24 12-24 12z"/>
  </g>
  <rect x="270" y="396" width="580" height="58" rx="12" fill="#521321"/>
  <text x="560" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#fff8ed">If any answer is no, move it out of the primary workflow.</text>
</svg>
