<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Content update flow</title>
  <desc id="desc">Flow for updating content safely.</desc>
  <rect width="1120" height="520" rx="24" fill="#fffaf2"/>
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#521321">Content updates move through checks</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <rect x="64" y="208" width="150" height="76" rx="12" fill="#521321"/><text x="139" y="253" fill="#fff8ed">Request</text>
    <rect x="258" y="208" width="150" height="76" rx="12" fill="#7a2633"/><text x="333" y="253" fill="#fff8ed">Source</text>
    <rect x="452" y="208" width="150" height="76" rx="12" fill="#d6a84f"/><text x="527" y="253" fill="#2a2023">Edit</text>
    <rect x="646" y="208" width="150" height="76" rx="12" fill="#f0e1bf"/><text x="721" y="253" fill="#521321">Build</text>
    <rect x="840" y="208" width="150" height="76" rx="12" fill="#521321"/><text x="915" y="253" fill="#fff8ed">Publish</text>
  </g>
  <g stroke="#d6a84f" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M216 246h38"/><path d="M410 246h38"/><path d="M604 246h38"/><path d="M798 246h38"/>
  </g>
  <text x="560" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#5d4d50">Confirm first. Edit the source of truth. Build before publishing.</text>
</svg>
