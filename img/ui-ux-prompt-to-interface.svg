    <text x="992" y="292" text-anchor="middle" font-size="15" fill="#fff2db">Owner</text>
    <text x="992" y="322" text-anchor="middle" font-size="15" fill="#fff2db">Support</text>
  </g>
  <g fill="none" stroke="#f0d8a5" stroke-width="5" stroke-linecap="round">
    <path d="M246 282h30"/>
    <path d="M462 282h30"/>
    <path d="M678 282h30"/>
    <path d="M894 282h30"/>
