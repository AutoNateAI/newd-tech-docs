  <rect x="64" y="438" width="992" height="54" rx="10" fill="#2a2023" stroke="#7a2633"/>
  <text x="560" y="473" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff8ed">If staff cannot use it without reading code, the workflow is not finished.</text>
