<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Prompt to interface workflow</title>
  <desc id="desc">A workflow from staff need through prompt, prototype, test, and documentation.</desc>
  <rect width="1120" height="560" rx="24" fill="#161316"/>
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#fff8ed">From prompt to working interface</text>
  <text x="64" y="122" font-family="Arial, sans-serif" font-size="18" fill="#f0d8a5">The prompt starts the work. The reviewed screen is the deliverable.</text>
  <g font-family="Arial, sans-serif">
    <rect x="64" y="178" width="178" height="210" rx="12" fill="#fff8ed"/>
    <text x="88" y="224" font-size="22" font-weight="700" fill="#521321">Staff Need</text>
    <text x="88" y="262" font-size="15" fill="#3d3033">Role</text>
    <text x="88" y="292" font-size="15" fill="#3d3033">Task</text>
    <text x="88" y="322" font-size="15" fill="#3d3033">Pain point</text>
    <rect x="280" y="178" width="178" height="210" rx="12" fill="#f0e1bf"/>
    <text x="304" y="224" font-size="22" font-weight="700" fill="#521321">Prompt</text>
    <text x="304" y="262" font-size="15" fill="#3d3033">Audience</text>
    <text x="304" y="292" font-size="15" fill="#3d3033">Job</text>
    <text x="304" y="322" font-size="15" fill="#3d3033">Constraints</text>
    <rect x="496" y="178" width="178" height="210" rx="12" fill="#d6a84f"/>
    <text x="520" y="224" font-size="22" font-weight="700" fill="#2a2023">Prototype</text>
    <text x="520" y="262" font-size="15" fill="#3d3033">Layout</text>
    <text x="520" y="292" font-size="15" fill="#3d3033">States</text>
    <text x="520" y="322" font-size="15" fill="#3d3033">Copy</text>
    <rect x="712" y="178" width="178" height="210" rx="12" fill="#fff8ed"/>
    <text x="736" y="224" font-size="22" font-weight="700" fill="#521321">Test</text>
    <text x="736" y="262" font-size="15" fill="#3d3033">Mobile</text>
    <text x="736" y="292" font-size="15" fill="#3d3033">Build</text>
    <text x="736" y="322" font-size="15" fill="#3d3033">Workflow</text>
    <rect x="928" y="178" width="128" height="210" rx="12" fill="#7a2633"/>
