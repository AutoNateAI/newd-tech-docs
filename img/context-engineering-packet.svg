<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Context engineering packet</title>
  <desc id="desc">The parts of a context packet for AI work.</desc>
  <rect width="1120" height="560" rx="24" fill="#161316"/>
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#fff8ed">Context packet</text>
  <text x="64" y="122" font-family="Arial, sans-serif" font-size="18" fill="#f0d8a5">Give AI the right facts before asking for the work.</text>
  <rect x="348" y="174" width="424" height="230" rx="18" fill="#fff8ed"/>
  <text x="560" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#521321">Useful AI Work</text>
  <text x="560" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#3d3033">Less guessing. Better fit.</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <rect x="72" y="168" width="188" height="70" rx="10" fill="#7a2633"/><text x="166" y="211" fill="#fff8ed">Goal</text>
    <rect x="72" y="272" width="188" height="70" rx="10" fill="#d6a84f"/><text x="166" y="315" fill="#2a2023">Audience</text>
    <rect x="72" y="376" width="188" height="70" rx="10" fill="#f0e1bf"/><text x="166" y="419" fill="#521321">Examples</text>
    <rect x="860" y="168" width="188" height="70" rx="10" fill="#7a2633"/><text x="954" y="211" fill="#fff8ed">Files</text>
    <rect x="860" y="272" width="188" height="70" rx="10" fill="#d6a84f"/><text x="954" y="315" fill="#2a2023">Constraints</text>
    <rect x="860" y="376" width="188" height="70" rx="10" fill="#f0e1bf"/><text x="954" y="419" fill="#521321">Checks</text>
  </g>
  <g stroke="#f0d8a5" stroke-width="4" stroke-linecap="round">
    <path d="M260 203h82"/><path d="M260 307h82"/><path d="M260 411h82"/>
    <path d="M778 203h82"/><path d="M778 307h82"/><path d="M778 411h82"/>
